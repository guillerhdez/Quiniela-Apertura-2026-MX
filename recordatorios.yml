name: Recordatorios de Quiniela

on:
  schedule:
    # Cada 15 minutos. GitHub no garantiza puntualidad exacta al minuto en
    # horarios de mucha carga — por eso el script usa una ventana de 45-75
    # minutos antes del kickoff, no un instante exacto.
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # permite correrlo manualmente desde la pestaña "Actions" para probar

jobs:
  recordatorios:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Instalar dependencias
        working-directory: scripts
        run: npm install

      - name: Enviar recordatorios si corresponde
        working-directory: scripts
        env:
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: node enviar-recordatorios.js
